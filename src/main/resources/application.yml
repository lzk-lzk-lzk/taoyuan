# 服务端口配置
server:
  port: 8080

logging:
  level:
    root: info
    com.example.peach: debug
    org.mybatis: debug
    com.baomidou.mybatisplus: debug
    org.springframework.jdbc: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Spring 基础配置
spring:
  application:
    name: peach
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/taoyuan?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# Swagger 文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.peach.modules.user.entity,com.example.peach.modules.variety.entity,com.example.peach.modules.category.entity,com.example.peach.modules.qrcode.entity
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: peach-resource-management-system-secret-key-2026
  expire-seconds: 86400
  header: Authorization
  token-prefix: Bearer

# 项目自定义配置
peach:
  file:
    storage-type: local
    base-path: D:/project/taoyuan/data
    upload-access-path: /static/**
    upload-url-prefix: /static
    image-max-size: 5242880
    allowed-image-types:
      - jpg
      - jpeg
      - png
      - webp
    endpoint: http://192.168.3.140:9000
    region: us-east-1
    access-key: pdwyadmin
    secret-key: pdwyadmin
    bucket: pdwy
  qrcode:
    default-target-prefix: https://example.com/miniapp/variety/detail?id=
    template-path: D:/project/taoyuan/data/moban.png
    title-center-x: 626
    title-y: 112
    qr-x: 896
    qr-y: 195
    qr-size: 264
    intro-x: 86
    intro-y: 252
    intro-max-width: 620
    intro-line-height: 48
    intro-max-rows: 3
    type-value-x: 156
    type-value-y: 527
    area-value-x: 206
    area-value-y: 595

# 微信小程序配置
wechat:
  miniapp:
    app-id: wx41bdbe09984179fa
    app-secret: b5b0faf89c195f717e6281e5962b5396
    access-token-url: https://api.weixin.qq.com/cgi-bin/token
    code2-session-url: https://api.weixin.qq.com/sns/jscode2session
